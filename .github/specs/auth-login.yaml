openapi: 3.0.3
info:
  title: Auth API - Login
  version: 1.0.0
  description: Login endpoint that returns user profile and tokens. Cookies (`accessToken`, `refreshToken`) are set in `Set-Cookie` headers for browser flows.
servers:
  - url: https://dummyjson.com
paths:
  /auth/login:
    post:
      summary: Authenticate user and return profile with tokens
      description: |
        Accepts username/password and optional `expiresInMins`. Returns user profile and JWT tokens in the JSON body and also sets `accessToken` and `refreshToken` cookies (for `credentials: 'include'` browser requests).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: emilys
              password: emilyspass
              expiresInMins: 30
      responses:
        '200':
          description: Successful authentication — user profile with tokens
          headers:
            Set-Cookie:
              description: |
                One or more `Set-Cookie` headers will be returned to set `accessToken` and `refreshToken` cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithTokens'
              examples:
                success:
                  summary: Example successful response
                  value:
                    id: 1
                    username: emilys
                    email: emily.johnson@x.dummyjson.com
                    firstName: Emily
                    lastName: Johnson
                    gender: female
                    image: https://dummyjson.com/icon/emilys/128
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Bad request (missing/invalid fields)
        '401':
          description: Unauthorized (invalid credentials)
components:
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          description: The user's username or identifier
        password:
          type: string
          format: password
          description: The user's password
        expiresInMins:
          type: integer
          description: Token expiry in minutes (optional, defaults to 60)
          default: 60
      required:
        - username
        - password
    UserWithTokens:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        gender:
          type: string
        image:
          type: string
          format: uri
        accessToken:
          type: string
          description: JWT access token (also returned as cookie)
        refreshToken:
          type: string
          description: JWT refresh token (also returned as cookie)
      required:
        - id
        - username
        - email
        - accessToken
        - refreshToken
